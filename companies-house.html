<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companies House — GenHub CRM</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .ch-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px;
      align-items: start;
    }
    .ch-panel {
      background: var(--color-white);
      border: 1px solid var(--color-gray-200);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .ch-panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--color-gray-200);
      background: var(--color-gray-100);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-gray-500);
    }
    .ch-account-list {
      max-height: 600px;
      overflow-y: auto;
    }
    .ch-account-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--color-gray-100);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ch-account-item:hover { background: var(--color-gray-100); }
    .ch-account-item.active { background: #dbeafe; font-weight: 600; }
    .ch-account-search {
      padding: 10px 16px;
      border-bottom: 1px solid var(--color-gray-200);
    }
    .ch-account-search input {
      width: 100%;
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid var(--color-gray-200);
      border-radius: 4px;
      font-family: var(--font-body);
    }

    .ch-detail {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .ch-search-results {
      max-height: 250px;
      overflow-y: auto;
    }
    .ch-search-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--color-gray-100);
      cursor: pointer;
      font-size: 13px;
    }
    .ch-search-item:hover { background: var(--color-gray-100); }
    .ch-search-item .ch-co-name { font-weight: 600; }
    .ch-search-item .ch-co-meta {
      font-size: 11px;
      color: var(--color-gray-500);
      margin-top: 2px;
    }

    .ch-section { margin-bottom: 0; }
    .ch-section-title {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-gray-500);
      padding: 10px 16px;
      background: var(--color-gray-100);
      border-bottom: 1px solid var(--color-gray-200);
    }
    .ch-field-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 0;
    }
    .ch-field-grid > div {
      padding: 8px 16px;
      border-bottom: 1px solid var(--color-gray-100);
      font-size: 12px;
    }
    .ch-field-label {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-gray-400);
      background: var(--color-gray-50);
    }
    .ch-field-value {
      font-family: var(--font-body);
      word-break: break-word;
    }
    .ch-field-value.empty { color: var(--color-gray-300); font-style: italic; }

    .ch-officers-table { width: 100%; font-size: 12px; border-collapse: collapse; }
    .ch-officers-table th {
      font-family: var(--font-ui); font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; color: var(--color-gray-500);
      background: var(--color-gray-50); padding: 6px 16px; text-align: left;
      border-bottom: 1px solid var(--color-gray-200);
    }
    .ch-officers-table td { padding: 8px 16px; border-bottom: 1px solid var(--color-gray-100); }
    .ch-officers-table tr.resigned { opacity: 0.4; }

    .ch-status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      font-family: var(--font-ui);
    }
    .ch-status-active { background: #dcfce7; color: #15803d; }
    .ch-status-dissolved { background: #fee2e2; color: #991b1b; }
    .ch-status-other { background: var(--color-gray-100); color: var(--color-gray-500); }

    @media (max-width: 900px) {
      .ch-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="app-header" id="app-header"></header>
  <div class="app-layout">
    <nav class="app-sidebar" id="app-sidebar"></nav>
    <main class="app-main">
      <div class="breadcrumbs"><a href="admin.html">Admin</a> / <span>Companies House</span></div>
      <div class="page-header">
        <div>
          <h1 class="page-title">Companies House Lookup</h1>
          <p style="font-size:13px;color:var(--color-gray-500);">Look up company profile, registered address, and officers from Companies House. Read-only.</p>
        </div>
      </div>

      <div class="ch-layout">
        <!-- Account list -->
        <div class="ch-panel">
          <div class="ch-panel-header">CRM Accounts</div>
          <div class="ch-account-search">
            <input type="text" id="acct-search" placeholder="Search accounts...">
          </div>
          <div class="ch-account-list" id="acct-list"></div>
        </div>

        <!-- Detail area -->
        <div class="ch-detail" id="detail-area">
          <div class="ch-panel">
            <div style="padding:20px;color:var(--color-gray-400);text-align:center;font-family:var(--font-ui);font-size:13px;">
              Select an account to look up on Companies House
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script>
    var allAccounts = [];
    var xeroContacts = [];
    var xeroByName = {};
    var xeroConnected = false;
    var currentAccountId = null;
    var currentAccount = null;
    var currentCompanyNumber = null;

    async function loadAccounts() {
      var promises = [SheetsAPI.getAll(CONFIG.SHEETS.ACCOUNTS)];

      try {
        var statusResp = await fetch('/api/xero/status');
        var statusData = await statusResp.json();
        xeroConnected = statusData.connected;
      } catch (e) {}

      if (xeroConnected) {
        promises.push(fetch('/api/xero/contacts').then(function(r) { return r.json(); }).catch(function() { return { contacts: [] }; }));
      }

      var results = await Promise.all(promises);
      allAccounts = results[0].filter(function(a) { return a.is_deleted !== 'TRUE'; });
      allAccounts.sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });

      if (xeroConnected && results[1]) {
        xeroContacts = results[1].contacts || [];
        xeroContacts.forEach(function(xc) {
          xeroByName[(xc.name || '').toLowerCase().trim()] = xc;
        });
      }

      renderAccountList('');

      document.getElementById('acct-search').addEventListener('input', function() {
        renderAccountList(this.value);
      });
    }

    function renderAccountList(query) {
      var list = document.getElementById('acct-list');
      list.textContent = '';
      var q = (query || '').toLowerCase().trim();

      var filtered = allAccounts.filter(function(a) {
        return !q || (a.name || '').toLowerCase().includes(q);
      });

      filtered.forEach(function(a) {
        var item = document.createElement('div');
        item.className = 'ch-account-item' + (a.account_id === currentAccountId ? ' active' : '');

        var logo = buildCompanyLogoEl(a.website, a.name, 20);
        item.appendChild(logo);

        var name = document.createElement('span');
        name.textContent = a.name || '(unnamed)';
        name.style.flex = '1';
        name.style.overflow = 'hidden';
        name.style.textOverflow = 'ellipsis';
        item.appendChild(name);

        if (a.company_number) {
          var linked = document.createElement('span');
          linked.textContent = '●';
          linked.style.color = '#15803d';
          linked.style.fontSize = '10px';
          linked.title = 'Linked: ' + a.company_number;
          item.appendChild(linked);
        }

        item.addEventListener('click', function() {
          currentAccountId = a.account_id;
          currentAccount = a;
          renderAccountList(document.getElementById('acct-search').value);
          if (a.company_number) {
            // Already linked — go straight to detail
            showLinkedCompany(a);
          } else {
            searchCompaniesHouse(a);
          }
        });

        list.appendChild(item);
      });
    }

    function buildCrmSummary(account) {
      var panel = document.createElement('div');
      panel.className = 'ch-panel ch-section';

      var title = document.createElement('div');
      title.className = 'ch-section-title';
      title.style.display = 'flex';
      title.style.justifyContent = 'space-between';
      title.style.alignItems = 'center';
      var titleText = document.createElement('span');
      titleText.textContent = 'CRM Data: ' + (account.name || '');
      title.appendChild(titleText);

      var viewLink = document.createElement('a');
      viewLink.href = 'account-detail.html?id=' + encodeURIComponent(account.account_id);
      viewLink.textContent = 'View Account';
      viewLink.style.cssText = 'font-size:10px;text-transform:none;letter-spacing:0;font-weight:500;color:var(--color-info);text-decoration:none;';
      title.appendChild(viewLink);
      panel.appendChild(title);

      var grid = document.createElement('div');
      grid.className = 'ch-field-grid';

      var address = [account.address_line1, account.address_line2, account.city, account.postcode].filter(Boolean).join(', ');

      var fields = [
        { label: 'Type', value: account.type },
        { label: 'Website', value: account.website },
        { label: 'Phone', value: account.phone },
        { label: 'Email', value: account.email },
        { label: 'Address', value: address },
        { label: 'Company No.', value: account.company_number },
        { label: 'VAT Number', value: account.vat_number },
        { label: 'Reg. Address', value: account.registered_address }
      ];

      fields.forEach(function(f) {
        var lbl = document.createElement('div');
        lbl.className = 'ch-field-label';
        lbl.textContent = f.label;
        grid.appendChild(lbl);

        var val = document.createElement('div');
        val.className = 'ch-field-value';
        if (!f.value) {
          val.classList.add('empty');
          val.textContent = '—';
        } else {
          val.textContent = f.value;
        }
        grid.appendChild(val);
      });

      panel.appendChild(grid);
      return panel;
    }

    function buildXeroSummary(account) {
      if (!xeroConnected) return null;

      var acctLower = (account.name || '').toLowerCase().trim();
      var xc = xeroByName[acctLower];

      // If no exact match, try close match
      var matchType = 'none';
      if (xc) {
        matchType = 'exact';
      } else {
        var bestScore = 0;
        var bestMatch = null;
        for (var key in xeroByName) {
          var candidate = xeroByName[key];
          if (acctLower.includes(key) || key.includes(acctLower)) {
            var score = Math.min(acctLower.length, key.length) / Math.max(acctLower.length, key.length);
            if (score > bestScore && score > 0.5) {
              bestScore = score;
              bestMatch = candidate;
            }
          }
        }
        if (bestMatch) {
          xc = bestMatch;
          matchType = 'close';
        }
      }

      if (!xc) return null;

      var panel = document.createElement('div');
      panel.className = 'ch-panel ch-section';

      var title = document.createElement('div');
      title.className = 'ch-section-title';
      title.style.display = 'flex';
      title.style.alignItems = 'center';
      title.style.gap = '8px';
      title.appendChild(document.createTextNode('Xero Data: ' + xc.name));

      var badge = document.createElement('span');
      badge.style.cssText = 'font-size:9px;padding:2px 6px;border-radius:8px;text-transform:none;letter-spacing:0;font-weight:600;';
      if (matchType === 'exact') {
        badge.style.background = '#dcfce7';
        badge.style.color = '#15803d';
        badge.textContent = 'Exact match';
      } else {
        badge.style.background = '#fef3c7';
        badge.style.color = '#92400e';
        badge.textContent = 'Close match';
      }
      title.appendChild(badge);
      panel.appendChild(title);

      var grid = document.createElement('div');
      grid.className = 'ch-field-grid';

      var xAddr = xc.address || {};
      var xeroAddress = [xAddr.line1, xAddr.line2, xAddr.city, xAddr.region, xAddr.postalCode, xAddr.country].filter(Boolean).join(', ');

      var fields = [
        { label: 'Email', value: xc.email },
        { label: 'Website', value: xc.website },
        { label: 'Phone', value: xc.phoneDefault || xc.phoneDDI || xc.phoneMobile },
        { label: 'Address', value: xeroAddress },
        { label: 'VAT Number', value: xc.taxNumber },
        { label: 'Co. Number', value: xc.companyNumber },
        { label: 'Account No.', value: xc.accountNumber },
        { label: 'Type', value: ((xc.isCustomer ? 'Customer ' : '') + (xc.isSupplier ? 'Supplier' : '')).trim() }
      ];

      fields.forEach(function(f) {
        var lbl = document.createElement('div');
        lbl.className = 'ch-field-label';
        lbl.textContent = f.label;
        grid.appendChild(lbl);

        var val = document.createElement('div');
        val.className = 'ch-field-value';
        if (!f.value) {
          val.classList.add('empty');
          val.textContent = '—';
        } else {
          val.textContent = f.value;
        }
        grid.appendChild(val);
      });

      panel.appendChild(grid);
      return panel;
    }

    async function showLinkedCompany(account) {
      var area = document.getElementById('detail-area');
      area.textContent = '';

      // CRM + Xero summary
      area.appendChild(buildCrmSummary(account));
      var xeroPanel = buildXeroSummary(account);
      if (xeroPanel) area.appendChild(xeroPanel);

      // Linked info bar
      var infoPanel = document.createElement('div');
      infoPanel.className = 'ch-panel';
      var infoHeader = document.createElement('div');
      infoHeader.className = 'ch-panel-header';
      infoHeader.style.display = 'flex';
      infoHeader.style.justifyContent = 'space-between';
      infoHeader.style.alignItems = 'center';
      var infoText = document.createElement('span');
      infoText.textContent = 'Linked to Companies House: ' + account.company_number;
      infoHeader.appendChild(infoText);

      var unlinkBtn = document.createElement('button');
      unlinkBtn.className = 'btn btn-sm';
      unlinkBtn.textContent = 'Unlink';
      unlinkBtn.style.fontSize = '10px';
      unlinkBtn.addEventListener('click', async function() {
        await unlinkCompany(account);
      });
      infoHeader.appendChild(unlinkBtn);

      var searchBtn = document.createElement('button');
      searchBtn.className = 'btn btn-sm';
      searchBtn.textContent = 'Search again';
      searchBtn.style.fontSize = '10px';
      searchBtn.style.marginLeft = '6px';
      searchBtn.addEventListener('click', function() {
        searchCompaniesHouse(account);
      });
      infoHeader.appendChild(searchBtn);

      infoPanel.appendChild(infoHeader);
      area.appendChild(infoPanel);

      var detailPanel = document.createElement('div');
      detailPanel.id = 'ch-company-detail';
      area.appendChild(detailPanel);

      loadCompanyDetail(account.company_number);
    }

    async function linkCompany(account, companyNumber, profile, address) {
      var idx = allAccounts.findIndex(function(a) { return a.account_id === account.account_id; });
      if (idx < 0) return;

      var allRaw = await SheetsAPI.getAll(CONFIG.SHEETS.ACCOUNTS);
      var sheetIdx = allRaw.findIndex(function(a) { return a.account_id === account.account_id; });
      if (sheetIdx < 0) return;

      var updated = Object.assign({}, allRaw[sheetIdx]);
      updated.company_number = companyNumber;
      if (profile && profile.name) updated.modified_at = nowISO();
      if (address) {
        var addrParts = [address.line1, address.line2, address.locality, address.region].filter(Boolean);
        updated.registered_address = addrParts.join(', ') + (address.postalCode ? ' ' + address.postalCode : '');
      }

      await SheetsAPI.update(CONFIG.SHEETS.ACCOUNTS, sheetIdx, updated);

      // Update local cache
      account.company_number = companyNumber;
      if (updated.registered_address) account.registered_address = updated.registered_address;

      showToast('Linked to ' + companyNumber);
      renderAccountList(document.getElementById('acct-search').value);
      showLinkedCompany(account);
    }

    async function unlinkCompany(account) {
      var allRaw = await SheetsAPI.getAll(CONFIG.SHEETS.ACCOUNTS);
      var sheetIdx = allRaw.findIndex(function(a) { return a.account_id === account.account_id; });
      if (sheetIdx < 0) return;

      var updated = Object.assign({}, allRaw[sheetIdx]);
      updated.company_number = '';
      updated.modified_at = nowISO();

      await SheetsAPI.update(CONFIG.SHEETS.ACCOUNTS, sheetIdx, updated);

      account.company_number = '';
      showToast('Unlinked from Companies House');
      renderAccountList(document.getElementById('acct-search').value);
      searchCompaniesHouse(account);
    }

    async function searchCompaniesHouse(account) {
      var area = document.getElementById('detail-area');
      area.textContent = '';

      // CRM + Xero summary at top
      area.appendChild(buildCrmSummary(account));
      var xeroPanel = buildXeroSummary(account);
      if (xeroPanel) area.appendChild(xeroPanel);

      // Show search results panel
      var searchPanel = document.createElement('div');
      searchPanel.className = 'ch-panel';

      var searchHeader = document.createElement('div');
      searchHeader.className = 'ch-panel-header';
      searchHeader.textContent = 'Companies House Search: "' + (account.name || '') + '"';
      searchPanel.appendChild(searchHeader);

      var searchBody = document.createElement('div');
      searchBody.className = 'ch-search-results';
      searchBody.textContent = 'Searching...';
      searchBody.style.padding = '16px';
      searchBody.style.color = 'var(--color-gray-400)';
      searchPanel.appendChild(searchBody);
      area.appendChild(searchPanel);

      // Detail panel (populated after selection)
      var detailPanel = document.createElement('div');
      detailPanel.id = 'ch-company-detail';
      area.appendChild(detailPanel);

      try {
        var resp = await fetch('/api/companies-house/search?q=' + encodeURIComponent(account.name));
        var data = await resp.json();

        if (data.error) {
          searchBody.textContent = 'Error: ' + data.error;
          return;
        }

        var companies = data.companies || [];
        searchBody.textContent = '';
        searchBody.style.padding = '0';

        if (companies.length === 0) {
          searchBody.style.padding = '16px';
          searchBody.textContent = 'No companies found matching "' + account.name + '"';
          return;
        }

        companies.forEach(function(co) {
          var item = document.createElement('div');
          item.className = 'ch-search-item';

          var nameEl = document.createElement('div');
          nameEl.className = 'ch-co-name';
          nameEl.textContent = co.name;
          item.appendChild(nameEl);

          var meta = document.createElement('div');
          meta.className = 'ch-co-meta';
          var parts = [co.companyNumber];
          if (co.status) parts.push(co.status);
          if (co.dateOfCreation) parts.push('Inc. ' + co.dateOfCreation);
          if (co.address) parts.push(co.address);
          meta.textContent = parts.join(' · ');
          item.appendChild(meta);

          var linkBtn = document.createElement('button');
          linkBtn.className = 'btn btn-sm';
          linkBtn.textContent = 'Link';
          linkBtn.style.cssText = 'float:right;font-size:10px;margin-top:-2px;';
          linkBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            // Fetch full detail then link
            fetch('/api/companies-house/company?number=' + encodeURIComponent(co.companyNumber))
              .then(function(r) { return r.json(); })
              .then(function(d) { linkCompany(account, co.companyNumber, d.profile, d.address); });
          });
          nameEl.appendChild(linkBtn);

          item.addEventListener('click', function() {
            searchBody.querySelectorAll('.ch-search-item').forEach(function(el) {
              el.style.background = '';
            });
            item.style.background = '#dbeafe';
            currentCompanyNumber = co.companyNumber;
            loadCompanyDetail(co.companyNumber);
          });

          searchBody.appendChild(item);
        });

        // Auto-select first result
        if (companies.length > 0) {
          searchBody.querySelector('.ch-search-item').style.background = '#dbeafe';
          loadCompanyDetail(companies[0].companyNumber);
        }

      } catch (err) {
        searchBody.textContent = 'Error: ' + err.message;
      }
    }

    async function loadCompanyDetail(companyNumber) {
      var container = document.getElementById('ch-company-detail');
      container.textContent = '';

      var loadingPanel = document.createElement('div');
      loadingPanel.className = 'ch-panel';
      loadingPanel.style.padding = '16px';
      loadingPanel.style.color = 'var(--color-gray-400)';
      loadingPanel.textContent = 'Loading company ' + companyNumber + '...';
      container.appendChild(loadingPanel);

      try {
        var resp = await fetch('/api/companies-house/company?number=' + encodeURIComponent(companyNumber));
        var data = await resp.json();

        if (data.error) {
          loadingPanel.textContent = 'Error: ' + data.error;
          return;
        }

        container.textContent = '';
        var profile = data.profile;
        var address = data.address;
        var officers = data.officers || [];

        // ─── Profile Section ───
        if (profile) {
          var profPanel = document.createElement('div');
          profPanel.className = 'ch-panel ch-section';

          var profTitle = document.createElement('div');
          profTitle.className = 'ch-section-title';
          profTitle.textContent = 'Company Profile';
          profPanel.appendChild(profTitle);

          var profGrid = document.createElement('div');
          profGrid.className = 'ch-field-grid';

          var statusClass = 'ch-status-other';
          if (profile.status === 'active') statusClass = 'ch-status-active';
          else if (profile.status === 'dissolved') statusClass = 'ch-status-dissolved';

          var profFields = [
            { label: 'Company Name', value: profile.name },
            { label: 'Company Number', value: profile.companyNumber },
            { label: 'Status', value: profile.status, badge: statusClass },
            { label: 'Type', value: profile.type },
            { label: 'Incorporated', value: profile.dateOfCreation },
            { label: 'Dissolved', value: profile.dateOfCessation },
            { label: 'SIC Codes', value: (profile.sicCodes || []).join(', ') },
            { label: 'Jurisdiction', value: profile.jurisdiction },
            { label: 'Accounts Due', value: profile.lastAccounts ? profile.lastAccounts.nextDue : '' },
            { label: 'Last Accounts', value: profile.lastAccounts ? profile.lastAccounts.madeUpTo : '' },
            { label: 'Conf. Statement', value: profile.confirmationStatement ? profile.confirmationStatement.nextDue : '' }
          ];

          profFields.forEach(function(f) {
            var lbl = document.createElement('div');
            lbl.className = 'ch-field-label';
            lbl.textContent = f.label;
            profGrid.appendChild(lbl);

            var val = document.createElement('div');
            val.className = 'ch-field-value';
            if (!f.value) {
              val.classList.add('empty');
              val.textContent = '—';
            } else if (f.badge) {
              var badge = document.createElement('span');
              badge.className = 'ch-status-badge ' + f.badge;
              badge.textContent = f.value;
              val.appendChild(badge);
            } else {
              val.textContent = f.value;
            }
            profGrid.appendChild(val);
          });

          profPanel.appendChild(profGrid);
          container.appendChild(profPanel);
        }

        // ─── Address Section ───
        if (address) {
          var addrPanel = document.createElement('div');
          addrPanel.className = 'ch-panel ch-section';

          var addrTitle = document.createElement('div');
          addrTitle.className = 'ch-section-title';
          addrTitle.textContent = 'Registered Office Address';
          addrPanel.appendChild(addrTitle);

          var addrGrid = document.createElement('div');
          addrGrid.className = 'ch-field-grid';

          var addrFields = [
            { label: 'Address Line 1', value: address.line1 },
            { label: 'Address Line 2', value: address.line2 },
            { label: 'Locality', value: address.locality },
            { label: 'Region', value: address.region },
            { label: 'Postal Code', value: address.postalCode },
            { label: 'Country', value: address.country }
          ];

          addrFields.forEach(function(f) {
            var lbl = document.createElement('div');
            lbl.className = 'ch-field-label';
            lbl.textContent = f.label;
            addrGrid.appendChild(lbl);

            var val = document.createElement('div');
            val.className = 'ch-field-value';
            if (!f.value) {
              val.classList.add('empty');
              val.textContent = '—';
            } else {
              val.textContent = f.value;
            }
            addrGrid.appendChild(val);
          });

          addrPanel.appendChild(addrGrid);
          container.appendChild(addrPanel);
        }

        // ─── Officers Section ───
        if (officers.length > 0) {
          var offPanel = document.createElement('div');
          offPanel.className = 'ch-panel ch-section';

          var offTitle = document.createElement('div');
          offTitle.className = 'ch-section-title';
          offTitle.textContent = 'Officers (' + officers.length + ')';
          offPanel.appendChild(offTitle);

          var table = document.createElement('table');
          table.className = 'ch-officers-table';
          var thead = document.createElement('thead');
          var headRow = document.createElement('tr');
          ['Name', 'Role', 'Appointed', 'Resigned', 'Nationality', 'Occupation'].forEach(function(h) {
            var th = document.createElement('th');
            th.textContent = h;
            headRow.appendChild(th);
          });
          thead.appendChild(headRow);
          table.appendChild(thead);

          var tbody = document.createElement('tbody');
          // Active officers first
          officers.sort(function(a, b) {
            if (a.resignedOn && !b.resignedOn) return 1;
            if (!a.resignedOn && b.resignedOn) return -1;
            return 0;
          });

          officers.forEach(function(off) {
            var tr = document.createElement('tr');
            if (off.resignedOn) tr.className = 'resigned';

            var fields = [off.name, off.role, off.appointedOn, off.resignedOn || '—', off.nationality, off.occupation];
            fields.forEach(function(v) {
              var td = document.createElement('td');
              td.textContent = v || '';
              tr.appendChild(td);
            });

            tbody.appendChild(tr);
          });

          table.appendChild(tbody);
          offPanel.appendChild(table);
          container.appendChild(offPanel);
        }

      } catch (err) {
        loadingPanel.textContent = 'Error: ' + err.message;
      }
    }

    (async function() {
      await initApp();
      await loadAccounts();
    })();
  </script>
</body>
</html>
