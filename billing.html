<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing — GenHub CRM</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .billing-table-wrap { overflow-x: auto; max-width: 100%; }
    .billing-table { border-collapse: separate; border-spacing: 0; font-size: 10px; white-space: nowrap; }
    .billing-table th, .billing-table td { padding: 4px 8px; border: 1px solid var(--color-gray-200); }
    .billing-table th {
      font-family: var(--font-ui); font-size: 9px; font-weight: 600;
      letter-spacing: 0.5px; text-transform: uppercase; color: var(--color-gray-500);
      background: var(--color-gray-100); position: sticky; top: 0; z-index: 2;
    }
    .billing-table .sticky-col { position: sticky; left: 0; background: var(--color-white); z-index: 4; box-shadow: 2px 0 4px -2px rgba(0,0,0,0.08); }
    .billing-table th.sticky-col { z-index: 5; background: var(--color-gray-100); }
    .billing-table .col-account { min-width: 140px; }
    .billing-table td.amount { text-align: right; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; }
    .billing-table td.amount.has-value { background: #f0faf4; }
    .billing-table tr:hover td.sticky-col { background: var(--color-gray-100); }
    .billing-total td { font-weight: 600; background: var(--color-gray-100) !important; }

    .zone-group-row td {
      font-family: var(--font-ui); font-size: 10px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase; color: var(--color-white);
      padding: 5px 8px; border: none; cursor: pointer; user-select: none;
    }
    .zone-group-row td .zone-toggle { display: inline-block; width: 14px; transition: transform 0.15s; }
    .zone-group-row.collapsed td .zone-toggle { transform: rotate(-90deg); }
    .zone-group-row td .zone-total { font-weight: 400; font-size: 9px; opacity: 0.85; margin-left: 8px; }
    .zone-group-row td .zone-col-totals { float: right; font-weight: 400; font-size: 9px; opacity: 0.85; }

    .billing-table tr.type-old td { color: var(--color-gray-400); }
    .billing-table tr.type-old td.has-value { background: #fafafa; }
    .billing-table tr.type-vacant td { color: var(--color-danger); font-style: italic; }
    .billing-table td.cat-additional { background: #e8f4fd; }

    .billing-table tr:hover td.sticky-col { z-index: 4; background: var(--color-gray-100); }

    .billing-table td.has-note .note-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--color-info); vertical-align: top; margin-left: 2px;
    }
    .note-tip {
      display: none; position: fixed;
      background: #1a1a2e; color: #fff; font-family: var(--font-ui); font-size: 11px;
      font-style: normal; white-space: normal; max-width: 200px;
      padding: 6px 10px; border-radius: var(--radius); z-index: 100;
      pointer-events: none; line-height: 1.4;
    }

    .zone-notes-btn {
      font-size: 9px; font-weight: 400; opacity: 0.85; margin-left: 12px;
      cursor: pointer; text-decoration: underline; text-transform: none; letter-spacing: 0;
    }
  </style>
</head>
<body>
  <header class="app-header" id="app-header"></header>
  <div class="app-layout">
    <nav class="app-sidebar" id="app-sidebar"></nav>
    <main class="app-main" style="max-width:none;">
      <div class="breadcrumbs"><a href="index.html">Dashboard</a> / Billing</div>
      <div class="page-header">
        <h1 class="page-title">Billing Forecast</h1>
      </div>

      <div class="toolbar">
        <input type="text" class="search-input" id="search" placeholder="Search account or area...">
        <label style="display:flex;align-items:center;gap:6px;font-family:var(--font-ui);font-size:11px;font-weight:500;color:var(--color-gray-500);cursor:pointer;">
          <input type="checkbox" id="show-old"> Show old
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-family:var(--font-ui);font-size:11px;font-weight:500;color:var(--color-gray-500);cursor:pointer;">
          <input type="checkbox" id="hide-vacant"> Hide vacant
        </label>
        <button class="btn btn-sm" id="collapse-all-btn" onclick="toggleCollapseAll()" style="margin-left:12px;">Collapse All</button>
        <span id="record-count" style="font-family:var(--font-ui);font-size:11px;color:var(--color-gray-400);margin-left:auto;"></span>
      </div>

      <div class="billing-table-wrap" id="table-wrap">
        <p style="padding:20px;color:var(--color-gray-400);font-family:var(--font-ui);font-size:13px;">Loading billing data...</p>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/lookups.js"></script>
  <script>
    var ZONE_COLOURS = [
      '#4a5568', '#2b6cb0', '#2f855a', '#9b2c2c', '#744210',
      '#553c9a', '#1a535c', '#6b3fa0', '#b7410e', '#2d3748'
    ];

    var SORTABLE_ZONES = ['CoClub Memberships', 'Postal Services'];
    var zoneSortMode = {}; // zone -> 'oldest' | 'az'
    SORTABLE_ZONES.forEach(function(z) { zoneSortMode[z] = 'oldest'; });

    var allRows = [];
    var allCols = [];
    var showOld = false;
    var hideVacant = false;

    function sortRows() {
      var zoneOrder = Lookups.get('zone');
      allRows.sort(function(a, b) {
        var ai = zoneOrder.indexOf(a.zone);
        var bi = zoneOrder.indexOf(b.zone);
        if (ai === -1 && bi === -1) {
          var zc = a.zone.localeCompare(b.zone);
          if (zc !== 0) return zc;
        } else {
          if (ai === -1) ai = 9999;
          if (bi === -1) bi = 9999;
          if (ai !== bi) return ai - bi;
        }
        var areaC = a.area.localeCompare(b.area);
        if (areaC !== 0) return areaC;
        if (SORTABLE_ZONES.indexOf(a.zone) !== -1) {
          var mode = zoneSortMode[a.zone] || 'oldest';
          if (mode === 'oldest') return (a.fromDate || 999999) - (b.fromDate || 999999) || a.account_name.localeCompare(b.account_name);
        }
        return a.account_name.localeCompare(b.account_name);
      });
    }

    async function loadBilling() {
      var data = await SheetsAPI.batchGet([
        CONFIG.SHEETS.BILLING, CONFIG.SHEETS.BILLING_AGREEMENTS,
        CONFIG.SHEETS.ACCOUNTS, CONFIG.SHEETS.AREAS
      ]);
      var billing = (data.Billing || []).filter(function(b) { return b.is_deleted !== 'TRUE'; });
      var agreements = (data.Billing_Agreement || []).filter(function(a) { return a.is_deleted !== 'TRUE'; });
      var accounts = (data.Accounts || []).filter(function(a) { return a.is_deleted !== 'TRUE'; });
      var areas = (data.Area || []).filter(function(a) { return a.is_deleted !== 'TRUE'; });

      // Build agreement lookup
      var agreementMap = {};
      agreements.forEach(function(a) { agreementMap[a.agreement_id] = a; });

      var acctNames = {};
      accounts.forEach(function(a) { acctNames[a.account_id] = a.name; });

      // Build area category lookup
      var areaCategoryMap = {};
      areas.forEach(function(a) {
        var key = (a.zone || '').toLowerCase() + '|' + (a.area || '').toLowerCase();
        areaCategoryMap[key] = (a.category || '').toLowerCase().trim();
      });

      var colSet = {};
      var rowMap = {};

      billing.forEach(function(b) {
        var agr = agreementMap[b.agreement_id] || {};
        var acctName = agr.account_name || acctNames[agr.account_id] || '';
        var zone = agr.zone || '';
        var area = agr.area || '';
        var type = (agr.type || '').toLowerCase().trim();
        var category = (agr.category || '').toLowerCase().trim();
        var month = (b.month || '').toUpperCase();
        var year = b.year || '';
        var amount = parseFloat(b.amount) || 0;
        if (!month || !year) return;

        var colKey = month + ' ' + year;
        colSet[colKey] = { month: month, year: year };

        var rowKey = acctName.toLowerCase() + '|' + zone.toLowerCase() + '|' + area.toLowerCase();
        var areaKey = zone.toLowerCase() + '|' + area.toLowerCase();
        if (!rowMap[rowKey]) {
          rowMap[rowKey] = { account_name: acctName, zone: zone, area: area, type: type, category: category || areaCategoryMap[areaKey] || '', amounts: {}, notes: {} };
        }
        if (type === 'old') rowMap[rowKey].type = 'old';
        rowMap[rowKey].amounts[colKey] = (rowMap[rowKey].amounts[colKey] || 0) + amount;
        if (b.notes) rowMap[rowKey].notes[colKey] = b.notes;
      });

      var monthOrder = { JAN:1, FEB:2, MAR:3, APR:4, MAY:5, JUN:6, JUL:7, AUG:8, SEP:9, OCT:10, NOV:11, DEC:12 };

      // Compute fromDate (earliest month+year with a value) for each row
      Object.values(rowMap).forEach(function(row) {
        var earliest = null;
        Object.keys(row.amounts).forEach(function(colKey) {
          var parts = colKey.split(' ');
          var m = monthOrder[parts[0]] || 0;
          var y = parseInt(parts[1]) || 0;
          var val = y * 100 + m;
          if (earliest === null || val < earliest) earliest = val;
        });
        row.fromDate = earliest || 999999;
      });
      allCols = Object.keys(colSet).sort(function(a, b) {
        var ca = colSet[a], cb = colSet[b];
        var d = parseInt(cb.year) - parseInt(ca.year);
        if (d !== 0) return d;
        return (monthOrder[cb.month] || 0) - (monthOrder[ca.month] || 0);
      });

      // Inject vacant rows for current areas with no active billing
      var activeAreaKeys = {};
      Object.values(rowMap).forEach(function(r) {
        if (r.type !== 'old') {
          activeAreaKeys[(r.zone || '').toLowerCase() + '|' + (r.area || '').toLowerCase()] = true;
        }
      });
      areas.forEach(function(a) {
        var cur = (a.current || '').toString().toLowerCase().trim();
        if (cur !== 'true' && cur !== 'yes' && cur !== 'y' && cur !== '1' && cur !== 'x') return;
        var key = (a.zone || '').toLowerCase() + '|' + (a.area || '').toLowerCase();
        if (!activeAreaKeys[key]) {
          var rowKey = '(vacant)|' + key;
          if (!rowMap[rowKey]) {
            rowMap[rowKey] = { account_name: '(vacant)', zone: a.zone || '', area: a.area || '', type: 'vacant', category: (a.category || '').toLowerCase().trim(), amounts: {}, notes: {} };
          }
        }
      });

      allRows = Object.values(rowMap);
      sortRows();
      renderTable();
    }

    var allCollapsed = false;
    function toggleCollapseAll() {
      allCollapsed = !allCollapsed;
      var btn = document.getElementById('collapse-all-btn');
      btn.textContent = allCollapsed ? 'Expand All' : 'Collapse All';
      document.querySelectorAll('.zone-group-row').forEach(function(ztr) {
        if (allCollapsed) {
          ztr.classList.add('collapsed');
        } else {
          ztr.classList.remove('collapsed');
        }
        var next = ztr.nextElementSibling;
        while (next && !next.classList.contains('zone-group-row') && !next.classList.contains('billing-total')) {
          if (next.classList.contains('zone-totals-row')) {
            next = next.nextElementSibling;
            continue;
          }
          next.style.display = allCollapsed ? 'none' : '';
          next = next.nextElementSibling;
        }
      });
    }

    function renderTable() {
      var wrap = document.getElementById('table-wrap');
      var countEl = document.getElementById('record-count');
      var filter = document.getElementById('search').value;

      var filtered = allRows;
      if (!showOld) {
        filtered = filtered.filter(function(r) { return r.type !== 'old'; });
      }
      if (hideVacant) {
        filtered = filtered.filter(function(r) { return r.type !== 'vacant'; });
      }
      if (filter) {
        var q = filter.toLowerCase();
        filtered = filtered.filter(function(r) {
          return r.account_name.toLowerCase().indexOf(q) !== -1
            || r.zone.toLowerCase().indexOf(q) !== -1
            || r.area.toLowerCase().indexOf(q) !== -1;
        });
      }

      countEl.textContent = filtered.length + ' rows';

      // Assign colours to zones
      var zones = [];
      filtered.forEach(function(r) {
        if (zones.indexOf(r.zone) === -1 && r.zone) zones.push(r.zone);
      });
      var zoneColour = {};
      zones.forEach(function(z, i) { zoneColour[z] = ZONE_COLOURS[i % ZONE_COLOURS.length]; });

      var cols = allCols;
      var table = document.createElement('table');
      table.className = 'billing-table';

      // Header
      var thead = document.createElement('thead');
      var tr = document.createElement('tr');
      ['Account', 'Area', 'Type'].forEach(function(label, i) {
        var th = document.createElement('th');
        if (i === 0) th.className = 'sticky-col col-account';
        th.textContent = label;
        tr.appendChild(th);
      });
      cols.forEach(function(col) {
        var th = document.createElement('th');
        th.textContent = col;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
      table.appendChild(thead);

      // Body with zone groups
      var tbody = document.createElement('tbody');
      var colTotals = {};
      cols.forEach(function(c) { colTotals[c] = 0; });
      var currentZone = null;
      var colCount = 3 + cols.length;

      // Pre-calculate zone totals
      var zoneTotals = {};
      filtered.forEach(function(row) {
        var z = row.zone || 'No Zone';
        if (!zoneTotals[z]) { zoneTotals[z] = {}; cols.forEach(function(c) { zoneTotals[z][c] = 0; }); }
        cols.forEach(function(col) { zoneTotals[z][col] += (row.amounts[col] || 0); });
      });

      filtered.forEach(function(row) {
        // Zone group header
        if (row.zone !== currentZone) {
          currentZone = row.zone;
          var zoneName = currentZone || 'No Zone';
          var zt = zoneTotals[zoneName] || {};
          var bgCol = zoneColour[currentZone] || '#4a5568';
          var ztr = document.createElement('tr');
          ztr.className = 'zone-group-row';
          ztr.setAttribute('data-zone', zoneName);

          // Zone label — full width, sticky
          var ztd = document.createElement('td');
          ztd.colSpan = cols.length + 3;
          ztd.style.background = bgCol;
          ztd.style.position = 'sticky';
          ztd.style.left = '0';
          var toggle = document.createElement('span');
          toggle.className = 'zone-toggle';
          toggle.textContent = '\u25BC';
          ztd.appendChild(toggle);
          ztd.appendChild(document.createTextNode(' ' + zoneName));

          // Sort toggle for CoClub / Postal zones
          if (SORTABLE_ZONES.indexOf(zoneName) !== -1) {
            var sortSpan = document.createElement('span');
            sortSpan.className = 'zone-notes-btn';
            sortSpan.style.marginLeft = '16px';
            var mode = zoneSortMode[zoneName] || 'oldest';
            var oldestLink = document.createElement('span');
            var azLink = document.createElement('span');
            function updateSortLinks() {
              var m = zoneSortMode[zoneName] || 'oldest';
              oldestLink.style.fontWeight = m === 'oldest' ? '700' : '400';
              oldestLink.style.textDecoration = m === 'oldest' ? 'none' : 'underline';
              oldestLink.style.cursor = m === 'oldest' ? 'default' : 'pointer';
              azLink.style.fontWeight = m === 'az' ? '700' : '400';
              azLink.style.textDecoration = m === 'az' ? 'none' : 'underline';
              azLink.style.cursor = m === 'az' ? 'default' : 'pointer';
            }
            sortSpan.appendChild(document.createTextNode('Sort: '));
            oldestLink.textContent = 'Oldest';
            oldestLink.addEventListener('click', function(e) {
              e.stopPropagation();
              zoneSortMode[zoneName] = 'oldest';
              sortRows();
              renderTable();
            });
            sortSpan.appendChild(oldestLink);
            sortSpan.appendChild(document.createTextNode(' | '));
            azLink.textContent = 'A-Z';
            azLink.addEventListener('click', function(e) {
              e.stopPropagation();
              zoneSortMode[zoneName] = 'az';
              sortRows();
              renderTable();
            });
            sortSpan.appendChild(azLink);
            updateSortLinks();
            ztd.appendChild(sortSpan);
          }

          var notesBtn = document.createElement('span');
          notesBtn.className = 'zone-notes-btn';
          notesBtn.textContent = 'Show notes';
          notesBtn.setAttribute('data-zone-notes', zoneName);
          notesBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            var showing = notesBtn.textContent === 'Hide notes';
            notesBtn.textContent = showing ? 'Show notes' : 'Hide notes';
            var next = ztr.nextElementSibling;
            while (next && !next.classList.contains('zone-group-row') && !next.classList.contains('billing-total')) {
              if (next.classList.contains('notes-row')) {
                next.style.display = showing ? 'none' : '';
              }
              next = next.nextElementSibling;
            }
          });
          ztd.appendChild(notesBtn);
          ztr.appendChild(ztd);
          ztr.addEventListener('click', function() {
            ztr.classList.toggle('collapsed');
            var hide = ztr.classList.contains('collapsed');
            var btn = ztr.querySelector('.zone-notes-btn');
            var notesVisible = btn && btn.textContent === 'Hide notes';
            var next = ztr.nextElementSibling;
            while (next && !next.classList.contains('zone-group-row') && !next.classList.contains('billing-total')) {
              // Skip zone totals row — always visible
              if (next.classList.contains('zone-totals-row')) {
                next = next.nextElementSibling;
                continue;
              }
              if (hide) {
                next.style.display = 'none';
              } else if (next.classList.contains('notes-row')) {
                next.style.display = notesVisible ? '' : 'none';
              } else {
                next.style.display = '';
              }
              next = next.nextElementSibling;
            }
          });
          tbody.appendChild(ztr);

          // Zone totals row — first row in each group
          var ztotalTr = document.createElement('tr');
          ztotalTr.className = 'zone-totals-row';
          ztotalTr.setAttribute('data-zone', zoneName);
          var ztotalLabel = document.createElement('td');
          ztotalLabel.className = 'sticky-col col-account';
          ztotalLabel.textContent = zoneName + ' Total';
          ztotalLabel.style.fontWeight = '600';
          ztotalLabel.style.fontSize = '9px';
          ztotalLabel.style.color = 'var(--color-gray-600)';
          ztotalLabel.style.background = 'var(--color-gray-100)';
          ztotalTr.appendChild(ztotalLabel);
          // Empty area + type cells
          var ztotalArea = document.createElement('td');
          ztotalArea.style.background = 'var(--color-gray-100)';
          ztotalTr.appendChild(ztotalArea);
          var ztotalType = document.createElement('td');
          ztotalType.style.background = 'var(--color-gray-100)';
          ztotalTr.appendChild(ztotalType);
          // Month totals
          cols.forEach(function(col) {
            var td = document.createElement('td');
            td.className = 'amount';
            td.style.fontWeight = '600';
            td.style.background = 'var(--color-gray-100)';
            var val = zt[col] || 0;
            if (val) {
              td.textContent = val.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
            ztotalTr.appendChild(td);
          });
          tbody.appendChild(ztotalTr);
        }

        var tr = document.createElement('tr');
        tr.setAttribute('data-zone', row.zone || 'No Zone');
        if (row.type === 'old') tr.className = 'type-old';
        if (row.type === 'vacant') tr.className = 'type-vacant';

        var tdAcct = document.createElement('td');
        tdAcct.className = 'sticky-col col-account';
        tdAcct.textContent = row.account_name;
        tr.appendChild(tdAcct);

        var tdArea = document.createElement('td');
        if (row.category === 'additional') tdArea.classList.add('cat-additional');
        tdArea.textContent = row.area;
        tr.appendChild(tdArea);

        var tdType = document.createElement('td');
        if (row.category === 'additional') tdType.classList.add('cat-additional');
        tdType.textContent = row.type;
        tr.appendChild(tdType);

        var hasNotes = false;
        cols.forEach(function(col) {
          var td = document.createElement('td');
          td.className = 'amount';
          var val = row.amounts[col];
          if (val != null) {
            td.textContent = val.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            td.classList.add('has-value');
            colTotals[col] += val;
          }
          if (row.notes[col]) {
            hasNotes = true;
            td.classList.add('has-note');
            var dot = document.createElement('span');
            dot.className = 'note-dot';
            td.appendChild(dot);
            var tip = document.createElement('span');
            tip.className = 'note-tip';
            tip.textContent = row.notes[col];
            td.appendChild(tip);
            td.addEventListener('mouseenter', function() {
              var rect = this.getBoundingClientRect();
              var tipEl = this.querySelector('.note-tip');
              tipEl.style.display = 'block';
              tipEl.style.left = rect.left + 'px';
              tipEl.style.top = (rect.top - tipEl.offsetHeight - 4) + 'px';
            });
            td.addEventListener('mouseleave', function() {
              this.querySelector('.note-tip').style.display = 'none';
            });
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);

        // Notes row (hidden by default, toggled per-zone via "Show notes" button)
        if (hasNotes) {
          var notesTr = document.createElement('tr');
          notesTr.className = 'notes-row';
          notesTr.setAttribute('data-zone', row.zone || 'No Zone');
          notesTr.style.display = 'none';
          var noteLabel = document.createElement('td');
          noteLabel.className = 'sticky-col col-account';
          noteLabel.style.cssText = 'font-size:9px;color:var(--color-gray-400);font-style:italic;';
          noteLabel.textContent = 'Notes';
          notesTr.appendChild(noteLabel);
          notesTr.appendChild(document.createElement('td'));
          notesTr.appendChild(document.createElement('td'));
          cols.forEach(function(col) {
            var td = document.createElement('td');
            td.style.cssText = 'font-size:9px;color:var(--color-info);font-style:italic;white-space:normal;max-width:80px;';
            if (row.notes[col]) td.textContent = row.notes[col];
            notesTr.appendChild(td);
          });
          tbody.appendChild(notesTr);
        }
      });

      // Totals row
      var totalTr = document.createElement('tr');
      totalTr.className = 'billing-total';
      var tdLabel = document.createElement('td');
      tdLabel.className = 'sticky-col col-account';
      tdLabel.textContent = 'Total';
      totalTr.appendChild(tdLabel);
      totalTr.appendChild(document.createElement('td'));
      totalTr.appendChild(document.createElement('td'));

      cols.forEach(function(col) {
        var td = document.createElement('td');
        td.className = 'amount';
        if (colTotals[col]) {
          td.textContent = colTotals[col].toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        totalTr.appendChild(td);
      });
      tbody.appendChild(totalTr);

      table.appendChild(tbody);
      wrap.textContent = '';
      wrap.appendChild(table);
    }

    (async function() {
      await initApp();
      await Lookups.load();
      document.getElementById('search').addEventListener('input', renderTable);
      document.getElementById('show-old').addEventListener('change', function() {
        showOld = this.checked;
        renderTable();
      });
      document.getElementById('hide-vacant').addEventListener('change', function() {
        hideVacant = this.checked;
        renderTable();
      });
      await loadBilling();
    })();
  </script>
</body>
</html>
