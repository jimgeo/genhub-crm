<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounts — GenHub CRM</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header" id="app-header"></header>
  <div class="app-layout">
    <nav class="app-sidebar" id="app-sidebar"></nav>
    <main class="app-main">
      <div class="page-header">
        <h1 class="page-title">Accounts</h1>
        <a href="account-detail.html?new=1" class="btn btn-primary">New Account</a>
      </div>

      <div class="toolbar">
        <input type="text" class="search-input" id="search" placeholder="Search accounts...">
        <span id="record-count" style="font-family:var(--font-ui);font-size:12px;color:var(--color-gray-400);"></span>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Phone</th>
              <th>Email</th>
              <th>City</th>
            </tr>
          </thead>
          <tbody id="accounts-tbody">
            <tr><td colspan="5" class="loading">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/accounts.js"></script>
  <script>
    (async () => {
      await initApp();
      await loadAccountsList();
    })();
  </script>
</body>
</html>
