<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Areas — GenHub CRM</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .category-group-row td {
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--color-gray-500); background: var(--color-gray-100);
      padding: 6px 12px; border-bottom: 2px solid var(--color-gray-200);
    }
  </style>
</head>
<body>
  <header class="app-header" id="app-header"></header>
  <div class="app-layout">
    <nav class="app-sidebar" id="app-sidebar"></nav>
    <main class="app-main">
      <div class="page-header">
        <h1 class="page-title">Areas</h1>
        <a href="area-detail.html?new=1" class="btn btn-primary">New Area</a>
      </div>

      <div class="toolbar">
        <input type="text" class="search-input" id="search" placeholder="Search areas...">
        <label style="display:flex;align-items:center;gap:6px;font-family:var(--font-ui);font-size:12px;font-weight:500;color:var(--color-gray-500);cursor:pointer;">
          <input type="checkbox" id="show-inactive"> Show inactive
        </label>
        <span id="record-count" style="font-family:var(--font-ui);font-size:12px;color:var(--color-gray-400);margin-left:auto;"></span>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Zone</th>
              <th>Area</th>
              <th>Type</th>
              <th>Category</th>
              <th>Description</th>
              <th>Current</th>
            </tr>
          </thead>
          <tbody id="areas-tbody">
            <tr><td colspan="6" class="loading">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/areas.js"></script>
  <script>
    (async function() {
      await initApp();
      await loadAreasList();
    })();
  </script>
</body>
</html>
