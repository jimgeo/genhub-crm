<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xero Contacts — GenHub CRM</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .match-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-ui);
    }
    .match-exact { background: #dcfce7; color: #15803d; }
    .match-close { background: #fef3c7; color: #92400e; }
    .match-none { background: var(--color-gray-100); color: var(--color-gray-500); }

    .link-btn {
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
    }

    .xero-stats {
      font-size: 13px;
      color: var(--color-gray-500);
      margin-left: 12px;
    }

    #link-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #link-modal.active { display: flex; }
    .modal-box {
      background: var(--color-white);
      border-radius: var(--radius);
      padding: 24px;
      width: 400px;
      max-height: 500px;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .modal-box h3 {
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 4px;
    }
    .modal-box .modal-sub {
      font-size: 12px;
      color: var(--color-gray-400);
      margin-bottom: 16px;
    }
    .modal-account-list {
      list-style: none;
      padding: 0;
      margin: 0 0 16px;
    }
    .modal-account-list li {
      padding: 8px 12px;
      border: 1px solid var(--color-gray-200);
      border-radius: var(--radius);
      margin-bottom: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font-body);
    }
    .modal-account-list li:hover {
      background: var(--color-gray-100);
    }
    .modal-search {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid var(--color-gray-200);
      border-radius: var(--radius);
      margin-bottom: 12px;
      font-family: var(--font-body);
    }
  </style>
</head>
<body>
  <header class="app-header" id="app-header"></header>
  <div class="app-layout">
    <nav class="app-sidebar" id="app-sidebar"></nav>
    <main class="app-main">
      <div class="breadcrumbs"><a href="admin.html">Admin</a> / <span>Xero Contacts</span></div>
      <div class="page-header">
        <div>
          <h1 class="page-title">Xero Contact Matching</h1>
          <p style="font-size:13px;color:var(--color-gray-500);">Match Xero contacts to CRM accounts for invoice display</p>
        </div>
        <div>
          <span class="xero-stats" id="stats"></span>
        </div>
      </div>

      <div class="toolbar">
        <input type="text" class="search-input" id="search" placeholder="Search contacts...">
        <select class="form-select" id="filter-match" style="width:auto;">
          <option value="">All</option>
          <option value="exact">Exact Match</option>
          <option value="close">Close Match</option>
          <option value="none">No Match</option>
        </select>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Xero Contact</th>
                <th>Type</th>
                <th>Match</th>
                <th>CRM Account</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="contacts-tbody">
              <tr><td colspan="5" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Link Modal -->
  <div id="link-modal">
    <div class="modal-box">
      <h3 id="modal-title">Link to CRM Account</h3>
      <div class="modal-sub" id="modal-sub"></div>
      <input type="text" class="modal-search" id="modal-search" placeholder="Search accounts...">
      <ul class="modal-account-list" id="modal-account-list"></ul>
      <div style="text-align:right;">
        <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script>
    let xeroContacts = [];
    let crmAccounts = [];
    let matchedData = [];
    let currentXeroContact = null;

    async function loadData() {
      const tbody = document.getElementById('contacts-tbody');

      try {
        // Check Xero connection
        const statusResp = await fetch('/api/xero/status');
        const statusData = await statusResp.json();
        if (!statusData.connected) {
          tbody.textContent = '';
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.setAttribute('colspan', '5');
          td.className = 'empty-state';
          td.textContent = 'Xero not connected. Go to Admin to connect.';
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }

        // Fetch Xero contacts and CRM accounts in parallel
        const [xeroResp, accountsRaw] = await Promise.all([
          fetch('/api/xero/contacts'),
          SheetsAPI.getAll(CONFIG.SHEETS.ACCOUNTS)
        ]);

        const xeroData = await xeroResp.json();
        xeroContacts = xeroData.contacts || [];
        crmAccounts = accountsRaw.filter(a => a.is_deleted !== 'TRUE');

        // Build match data
        matchedData = xeroContacts.map(xc => {
          const result = findMatch(xc.name, crmAccounts);
          return {
            xero: xc,
            matchType: result.type,
            crmAccount: result.account,
            score: result.score
          };
        });

        // Sort: no match first, then close, then exact
        const order = { none: 0, close: 1, exact: 2 };
        matchedData.sort((a, b) => (order[a.matchType] || 0) - (order[b.matchType] || 0));

        updateStats();
        applyFilters();
        wireControls();

      } catch (err) {
        tbody.textContent = '';
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.setAttribute('colspan', '5');
        td.className = 'empty-state';
        td.textContent = 'Error loading data: ' + err.message;
        tr.appendChild(td);
        tbody.appendChild(tr);
      }
    }

    function findMatch(xeroName, accounts) {
      if (!xeroName) return { type: 'none', account: null, score: 0 };

      const xeroLower = xeroName.toLowerCase().trim();

      // Exact match
      const exact = accounts.find(a => (a.name || '').toLowerCase().trim() === xeroLower);
      if (exact) return { type: 'exact', account: exact, score: 1 };

      // Close match — check if one contains the other, or similar
      let bestMatch = null;
      let bestScore = 0;

      for (const acct of accounts) {
        const acctLower = (acct.name || '').toLowerCase().trim();
        if (!acctLower) continue;

        // Contains match
        if (xeroLower.includes(acctLower) || acctLower.includes(xeroLower)) {
          const score = Math.min(xeroLower.length, acctLower.length) / Math.max(xeroLower.length, acctLower.length);
          if (score > bestScore) {
            bestScore = score;
            bestMatch = acct;
          }
        }

        // Word overlap match
        const xeroWords = xeroLower.split(/\s+/);
        const acctWords = acctLower.split(/\s+/);
        const overlap = xeroWords.filter(w => acctWords.includes(w) && w.length > 2).length;
        const totalWords = Math.max(xeroWords.length, acctWords.length);
        if (totalWords > 0) {
          const wordScore = overlap / totalWords;
          if (wordScore > 0.4 && wordScore > bestScore) {
            bestScore = wordScore;
            bestMatch = acct;
          }
        }
      }

      if (bestMatch && bestScore > 0.3) {
        return { type: 'close', account: bestMatch, score: bestScore };
      }

      return { type: 'none', account: null, score: 0 };
    }

    function updateStats() {
      const exact = matchedData.filter(d => d.matchType === 'exact').length;
      const close = matchedData.filter(d => d.matchType === 'close').length;
      const none = matchedData.filter(d => d.matchType === 'none').length;
      const el = document.getElementById('stats');
      el.textContent = matchedData.length + ' contacts | ' + exact + ' matched | ' + close + ' close | ' + none + ' unmatched';
    }

    function wireControls() {
      document.getElementById('search').addEventListener('input', applyFilters);
      document.getElementById('filter-match').addEventListener('change', applyFilters);
    }

    function applyFilters() {
      const query = document.getElementById('search').value.toLowerCase().trim();
      const matchFilter = document.getElementById('filter-match').value;

      let filtered = matchedData;

      if (matchFilter) {
        filtered = filtered.filter(d => d.matchType === matchFilter);
      }

      if (query) {
        filtered = filtered.filter(d =>
          d.xero.name.toLowerCase().includes(query) ||
          (d.crmAccount && (d.crmAccount.name || '').toLowerCase().includes(query))
        );
      }

      renderTable(filtered);
    }

    function renderTable(data) {
      const tbody = document.getElementById('contacts-tbody');
      tbody.textContent = '';

      if (data.length === 0) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.setAttribute('colspan', '5');
        td.className = 'empty-state';
        td.textContent = 'No contacts match filters';
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      for (const item of data) {
        const tr = document.createElement('tr');

        // Xero Contact name
        const tdName = document.createElement('td');
        tdName.style.fontWeight = '600';
        tdName.textContent = item.xero.name;
        tr.appendChild(tdName);

        // Type (customer/supplier)
        const tdType = document.createElement('td');
        const types = [];
        if (item.xero.isCustomer) types.push('Customer');
        if (item.xero.isSupplier) types.push('Supplier');
        tdType.textContent = types.join(', ') || '';
        tdType.style.fontSize = '12px';
        tdType.style.color = 'var(--color-gray-500)';
        tr.appendChild(tdType);

        // Match status
        const tdMatch = document.createElement('td');
        const badge = document.createElement('span');
        badge.className = 'match-badge';
        if (item.matchType === 'exact') {
          badge.classList.add('match-exact');
          badge.textContent = 'Exact';
        } else if (item.matchType === 'close') {
          badge.classList.add('match-close');
          badge.textContent = 'Close';
        } else {
          badge.classList.add('match-none');
          badge.textContent = 'No Match';
        }
        tdMatch.appendChild(badge);
        tr.appendChild(tdMatch);

        // CRM Account
        const tdCrm = document.createElement('td');
        if (item.crmAccount) {
          const link = document.createElement('a');
          link.href = 'account-detail.html?id=' + encodeURIComponent(item.crmAccount.account_id);
          link.textContent = item.crmAccount.name;
          link.style.color = 'var(--color-info)';
          link.style.textDecoration = 'none';
          tdCrm.appendChild(link);
        } else {
          tdCrm.textContent = '—';
          tdCrm.style.color = 'var(--color-gray-400)';
        }
        tr.appendChild(tdCrm);

        // Actions
        const tdActions = document.createElement('td');
        if (item.matchType !== 'exact') {
          const linkBtn = document.createElement('button');
          linkBtn.className = 'btn btn-sm link-btn';
          linkBtn.textContent = item.matchType === 'close' ? 'Change' : 'Link';
          linkBtn.addEventListener('click', function() { openLinkModal(item); });
          tdActions.appendChild(linkBtn);
        }
        if (item.crmAccount) {
          const viewBtn = document.createElement('a');
          viewBtn.href = 'account-detail.html?id=' + encodeURIComponent(item.crmAccount.account_id);
          viewBtn.className = 'btn btn-sm';
          viewBtn.textContent = 'View';
          viewBtn.style.marginLeft = '4px';
          tdActions.appendChild(viewBtn);
        }
        tr.appendChild(tdActions);

        tbody.appendChild(tr);
      }
    }

    /* ---- Link Modal ---- */
    function openLinkModal(item) {
      currentXeroContact = item;
      const modal = document.getElementById('link-modal');
      const title = document.getElementById('modal-title');
      const sub = document.getElementById('modal-sub');
      const searchInput = document.getElementById('modal-search');

      title.textContent = 'Link "' + item.xero.name + '"';
      sub.textContent = 'Select the CRM account this Xero contact belongs to';
      searchInput.value = '';

      modal.classList.add('active');
      renderModalAccounts('');

      searchInput.addEventListener('input', function() {
        renderModalAccounts(this.value);
      });

      // Close on backdrop click
      modal.addEventListener('click', function(e) {
        if (e.target === modal) closeModal();
      });

      searchInput.focus();
    }

    function renderModalAccounts(query) {
      const list = document.getElementById('modal-account-list');
      list.textContent = '';

      const q = query.toLowerCase().trim();
      let filtered = crmAccounts;
      if (q) {
        filtered = filtered.filter(a => (a.name || '').toLowerCase().includes(q));
      }

      // Show max 20
      filtered.slice(0, 20).forEach(acct => {
        const li = document.createElement('li');
        li.textContent = acct.name || '(unnamed)';
        li.addEventListener('click', function() { linkContact(acct); });
        list.appendChild(li);
      });

      if (filtered.length === 0) {
        const li = document.createElement('li');
        li.textContent = 'No accounts found';
        li.style.color = 'var(--color-gray-400)';
        li.style.cursor = 'default';
        list.appendChild(li);
      }

      if (filtered.length > 20) {
        const li = document.createElement('li');
        li.textContent = '... ' + (filtered.length - 20) + ' more — refine your search';
        li.style.color = 'var(--color-gray-400)';
        li.style.cursor = 'default';
        li.style.fontSize = '12px';
        list.appendChild(li);
      }
    }

    function linkContact(crmAccount) {
      if (!currentXeroContact) return;

      // Update the match data in memory
      currentXeroContact.matchType = 'exact';
      currentXeroContact.crmAccount = crmAccount;
      currentXeroContact.score = 1;

      closeModal();
      updateStats();
      applyFilters();

      showToast('Linked "' + currentXeroContact.xero.name + '" to "' + crmAccount.name + '"');
    }

    function closeModal() {
      document.getElementById('link-modal').classList.remove('active');
      currentXeroContact = null;
    }

    (async function() {
      await initApp();
      await loadData();
    })();
  </script>
</body>
</html>
