<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — GenHub CRM</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header" id="app-header"></header>
  <div class="app-layout">
    <nav class="app-sidebar" id="app-sidebar"></nav>
    <main class="app-main">
      <div class="breadcrumbs"><a href="contacts.html">Contacts</a> / <span id="breadcrumb-name">New Contact</span></div>
      <div class="page-header">
        <h1 class="page-title" id="page-title">New Contact</h1>
      </div>

      <div class="card">
        <div class="section-title">Details</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-input" id="f-first_name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-input" id="f-last_name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="f-email">
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" class="form-input" id="f-phone">
          </div>
          <div class="form-group">
            <label class="form-label">Mobile</label>
            <input type="tel" class="form-input" id="f-mobile">
          </div>
          <div class="form-group">
            <label class="form-label">Job Title</label>
            <input type="text" class="form-input" id="f-job_title">
          </div>
          <div class="form-group">
            <label class="form-label">Account</label>
            <select class="form-select" id="f-account_id">
              <option value="">— No Account —</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" id="btn-save" onclick="saveContact()">Save</button>
          <a href="contacts.html" class="btn">Cancel</a>
          <button class="btn btn-danger" id="btn-delete" style="display:none;margin-left:auto;" onclick="deleteContact()">Delete</button>
        </div>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/contacts.js"></script>
  <script>
    (async () => {
      await initApp();
      await loadContactDetail();
    })();
  </script>
</body>
</html>
