<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Area — GenHub CRM</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header" id="app-header"></header>
  <div class="app-layout">
    <nav class="app-sidebar" id="app-sidebar"></nav>
    <main class="app-main">
      <div class="breadcrumbs"><a href="areas.html">Areas</a> / <span id="breadcrumb-name">New Area</span></div>
      <div class="page-header">
        <h1 class="page-title" id="page-title">New Area</h1>
      </div>

      <div class="card">
        <div class="section-title">Details</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Zone</label>
            <input type="text" class="form-input" id="f-zone">
          </div>
          <div class="form-group">
            <label class="form-label">Area</label>
            <input type="text" class="form-input" id="f-area" required>
          </div>
          <div class="form-group">
            <label class="form-label">Single / Multi</label>
            <select class="form-select" id="f-member_single_multi">
              <option value="">— Select —</option>
              <option value="Single">Single</option>
              <option value="Multi">Multi</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <input type="text" class="form-input" id="f-category">
          </div>
          <div class="form-group full-width">
            <label class="form-label">Description</label>
            <textarea class="form-textarea" id="f-description"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" style="display:flex;align-items:center;gap:8px;">
              <input type="checkbox" id="f-current" checked> Current
            </label>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" id="btn-save" onclick="saveArea()">Save</button>
          <a href="areas.html" class="btn">Cancel</a>
          <button class="btn btn-danger" id="btn-delete" style="display:none;margin-left:auto;" onclick="deleteArea()">Delete</button>
        </div>
      </div>

      <!-- Linked Accounts -->
      <div class="linked-section" id="accounts-section" style="display:none;">
        <div class="linked-header">
          <h3 class="card-title">Accounts</h3>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Account</th>
                <th>From</th>
                <th>To</th>
                <th>Current</th>
              </tr>
            </thead>
            <tbody id="accounts-tbody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/areas.js"></script>
  <script>
    (async function() {
      await initApp();
      await loadAreaDetail();
    })();
  </script>
</body>
</html>
